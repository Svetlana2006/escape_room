name: gh-pages Deploy Activity

on:
  push:
    branches:
      - gh-pages

permissions:
  contents: read

jobs:
  gh-pages-updated:
    name: Record gh-pages publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Report deploy details
        run: |
          echo "gh-pages branch updated successfully."
          echo "Commit: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"
